<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512">
  <defs>
    <filter id="rough">
      <feTurbulence type="fractalNoise" baseFrequency="0.04" numOctaves="4" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="6" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <filter id="chisel">
      <feTurbulence type="fractalNoise" baseFrequency="0.08" numOctaves="3" result="noise"/>
      <feDisplacementMap in="SourceGraphic" in2="noise" scale="3" xChannelSelector="R" yChannelSelector="G"/>
    </filter>
    <linearGradient id="stoneGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#8B8682"/>
      <stop offset="50%" style="stop-color:#A8A29E"/>
      <stop offset="100%" style="stop-color:#78716C"/>
    </linearGradient>
    <linearGradient id="keyGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#D6D3D1"/>
      <stop offset="100%" style="stop-color:#A8A29E"/>
    </linearGradient>
    <radialGradient id="bgGrad" cx="50%" cy="50%" r="50%">
      <stop offset="0%" style="stop-color:#1C1917"/>
      <stop offset="100%" style="stop-color:#0C0A09"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <circle cx="256" cy="256" r="250" fill="url(#bgGrad)"/>

  <!-- Stone block - irregular hexagon shape -->
  <g filter="url(#rough)">
    <path d="M130,170 L200,100 L340,110 L400,200 L380,350 L290,420 L150,400 L100,290 Z"
          fill="url(#stoneGrad)" stroke="#57534E" stroke-width="3"/>
  </g>

  <!-- Stone face highlights and shadows for depth -->
  <path d="M140,180 L200,115 L330,120 L385,200 L370,340 L285,405 L155,390 L110,285 Z"
        fill="none" stroke="#D6D3D1" stroke-width="1" opacity="0.3"/>
  <path d="M125,170 L195,95 L340,105 L400,195 L385,350 L290,425 L145,405 L95,290 Z"
        fill="none" stroke="#44403C" stroke-width="1" opacity="0.4"/>

  <!-- Key carved into the stone -->
  <g filter="url(#chisel)" transform="translate(256,270) rotate(-15) translate(-256,-270)">
    <!-- Key bow (circular head) -->
    <circle cx="185" cy="230" r="52" fill="none" stroke="url(#keyGrad)" stroke-width="14"/>
    <circle cx="185" cy="230" r="35" fill="none" stroke="url(#keyGrad)" stroke-width="10"/>

    <!-- Key shaft -->
    <rect x="225" y="218" width="140" height="24" rx="6" fill="url(#keyGrad)"/>

    <!-- Key teeth -->
    <rect x="320" y="242" width="30" height="35" rx="4" fill="url(#keyGrad)"/>
    <rect x="300" y="242" width="15" height="22" rx="3" fill="url(#keyGrad)"/>

    <!-- Carved-in shadow effect -->
    <circle cx="185" cy="230" r="55" fill="none" stroke="#44403C" stroke-width="3" opacity="0.5"/>
    <rect x="222" y="215" width="146" height="30" rx="8" fill="none" stroke="#44403C" stroke-width="2" opacity="0.5"/>
    <rect x="317" y="239" width="36" height="41" rx="5" fill="none" stroke="#44403C" stroke-width="2" opacity="0.5"/>
  </g>

  <!-- Tool marks / chisel lines on stone surface -->
  <g opacity="0.15" stroke="#1C1917" stroke-width="1.5">
    <line x1="200" y1="140" x2="280" y2="380"/>
    <line x1="240" y1="120" x2="320" y2="390"/>
    <line x1="160" y1="180" x2="220" y2="400"/>
    <line x1="300" y1="130" x2="370" y2="360"/>
    <line x1="140" y1="280" x2="350" y2="160"/>
  </g>
</svg>
